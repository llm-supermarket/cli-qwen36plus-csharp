name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            suffix: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            suffix: linux-arm64
          - os: macos-latest
            rid: osx-x64
            suffix: darwin-x64
          - os: macos-latest
            rid: osx-arm64
            suffix: darwin-arm64
          - os: windows-latest
            rid: win-x64
            suffix: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Publish
        run: dotnet publish src/RcloneEncrypt -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none -p:DebugSymbols=false
      - name: Package binary (unix)
        if: matrix.rid != 'win-x64'
        run: |
          mv src/RcloneEncrypt/bin/Release/net10.0/${{ matrix.rid }}/publish/RcloneEncrypt cli-qwen36plus-csharp-${{ matrix.suffix }}
          tar czf cli-qwen36plus-csharp-${{ matrix.suffix }}.tar.gz cli-qwen36plus-csharp-${{ matrix.suffix }}
      - name: Rename binary (windows)
        if: matrix.rid == 'win-x64'
        run: |
          mv src/RcloneEncrypt/bin/Release/net10.0/${{ matrix.rid }}/publish/RcloneEncrypt.exe cli-qwen36plus-csharp-${{ matrix.suffix }}.exe
      - name: Upload artifact (unix)
        if: matrix.rid != 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-qwen36plus-csharp-${{ matrix.suffix }}
          path: cli-qwen36plus-csharp-${{ matrix.suffix }}.tar.gz
      - name: Upload artifact (windows)
        if: matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-qwen36plus-csharp-${{ matrix.suffix }}
          path: cli-qwen36plus-csharp-${{ matrix.suffix }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
      - name: Switch to main branch
        run: |
          git checkout main
          git pull --rebase origin main
      - name: Update Scoop manifest
        shell: pwsh
        run: ./updatescoop.ps1 -Version ${{ steps.version.outputs.VERSION }}
      - name: Update Brew formula
        shell: pwsh
        run: ./updatebrew.ps1 -Version ${{ steps.version.outputs.VERSION }}
      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update package manifests to ${{ github.ref_name }}"
          file_pattern: "cli-qwen36plus-csharp.json Formula/cli-qwen36plus-csharp.rb"
